name: Actualizar datos XG (FBref)

on:
  schedule:
    - cron: '0 6 * * *'   # Cada día a las 6am UTC
  workflow_dispatch:        # Manual desde GitHub Actions

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias
        run: npm install node-fetch@2

      - name: Ejecutar scraper FBref
        run: node fetch-xg.js
        timeout-minutes: 30

      - name: Verificar data.json
        run: |
          echo "Tamaño data.json:"
          wc -c data.json
          echo "Preview:"
          node -e "const d=require('./data.json'); console.log('Equipos:', d.meta.totalTeams, '| Ligas:', d.meta.leagues.length)"

      - name: Commit y push data.json
        run: |
          git config user.name  "actions-user"
          git config user.email "actions@github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "🔄 Actualizar datos XG - $(date '+%Y-%m-%d')"
          git push
